name: Dependency Boundary Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  import-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Enforces REPOSITORY_STRUCTURE.md §6.1's import graph and §6.2's
      # single-importer rule for providers/registry.py, per §6.3.
      - name: Enforce import boundaries
        run: lint-imports
